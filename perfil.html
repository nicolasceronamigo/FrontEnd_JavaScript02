<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil Académico</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="contenedor perfil-card">

        <h1>Perfil Académico</h1>

        <div class="perfil">

            <div class="dato">
                <span class="etiqueta">Nombre:</span>
                <span id="nombreAlumno"></span>
            </div>

            <div class="dato">
                <span class="etiqueta">Correo:</span>
                <span id="correoAlumno"></span>
            </div>

            <div class="dato">
                <span class="etiqueta">Carrera:</span>
                <span id="carreraAlumno"></span>
            </div>

            <div class="dato">
                <span class="etiqueta">Semestre:</span>
                <span id="semestreAlumno"></span>
            </div>

            <div class="dato">
                <span class="etiqueta">Promedio:</span>
                <span id="promedioAlumno"></span>
            </div>

            <div class="dato">
                <span class="etiqueta">Estado:</span>
                <span id="estadoAlumno"></span>
            </div>

        </div>

        <div class="acciones">
            <button id="btnVolver">
                Volver
            </button>

            <button id="btnCerrar">
                Cerrar Registro
            </button>
        </div>

    </div>

    <script src="perfil.js"></script>

</body>
</html>
